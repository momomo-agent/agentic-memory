<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>agentic-memory demo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #09090b; color: #e4e4e7;
      min-height: 100vh; padding: 40px 24px;
    }
    .page { max-width: 640px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    h1 span { color: #a78bfa; }
    .sub { color: #71717a; font-size: 13px; margin-bottom: 32px; }

    .chat {
      border: 1px solid #1c1c1c; border-radius: 10px;
      background: #0c0c0c; min-height: 300px; max-height: 480px;
      overflow-y: auto; padding: 16px; margin-bottom: 12px;
    }
    .msg { margin-bottom: 12px; font-size: 14px; line-height: 1.6; }
    .msg .role { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .msg.user .role { color: #60a5fa; }
    .msg.assistant .role { color: #a78bfa; }
    .msg.system .role { color: #f59e0b; }
    .msg .text { color: #d4d4d8; }
    .msg.system .text { color: #71717a; font-style: italic; font-size: 13px; }

    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .input-row input {
      flex: 1; padding: 10px 14px; background: #18181b; border: 1px solid #27272a;
      border-radius: 8px; color: #e4e4e7; font-size: 14px; outline: none;
      font-family: inherit;
    }
    .input-row input:focus { border-color: #a78bfa; }
    .input-row button {
      padding: 10px 20px; background: #a78bfa; color: #000; border: none;
      border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 14px;
      font-family: inherit;
    }

    .stats {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      margin-bottom: 16px;
    }
    .stat {
      background: #0f0f0f; border: 1px solid #1c1c1c; border-radius: 8px;
      padding: 12px; text-align: center;
    }
    .stat .val { font-size: 18px; font-weight: 600; color: #a78bfa; }
    .stat .lbl { font-size: 11px; color: #555; margin-top: 2px; }

    .controls { display: flex; gap: 8px; flex-wrap: wrap; }
    .controls button {
      padding: 7px 14px; background: #18181b; border: 1px solid #27272a;
      border-radius: 6px; color: #71717a; font-size: 12px; cursor: pointer;
      font-family: inherit; transition: all 0.15s;
    }
    .controls button:hover { border-color: #3f3f46; color: #a1a1aa; }

    .log { margin-top: 20px; font-size: 12px; color: #3f3f46; }
  </style>
</head>
<body>
  <div class="page">
    <h1><span>🧠</span> agentic-memory</h1>
    <p class="sub">Conversation memory with auto-trimming — try filling it up</p>

    <div class="stats" id="stats">
      <div class="stat"><div class="val" id="sTokens">0</div><div class="lbl">Tokens</div></div>
      <div class="stat"><div class="val" id="sMsgs">0</div><div class="lbl">Messages</div></div>
      <div class="stat"><div class="val" id="sTurns">0</div><div class="lbl">Turns</div></div>
      <div class="stat"><div class="val" id="sSum">—</div><div class="lbl">Summary</div></div>
    </div>

    <div class="chat" id="chat"></div>

    <div class="input-row">
      <input id="input" placeholder="Type a message..." autofocus>
      <button onclick="send()">Send</button>
    </div>

    <div class="controls">
      <button onclick="setMax(500)">Max 500 tokens</button>
      <button onclick="setMax(2000)">Max 2000 tokens</button>
      <button onclick="toggleStrategy()">Strategy: <span id="strat">sliding</span></button>
      <button onclick="fillUp()">Fill 20 messages</button>
      <button onclick="clearAll()">Clear</button>
      <button onclick="exportState()">Export JSON</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <script src="./memory.js"></script>
  <script>
    let maxTokens = 2000
    let strategy = 'sliding'
    let mem = AgenticMemory.createMemory({
      maxTokens,
      trimStrategy: strategy,
      systemPrompt: 'You are a helpful assistant.'
    })

    const chatEl = document.getElementById('chat')
    const inputEl = document.getElementById('input')

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') send()
    })

    function rebuild() {
      mem = AgenticMemory.createMemory({
        maxTokens,
        trimStrategy: strategy,
        systemPrompt: 'You are a helpful assistant.'
      })
      chatEl.innerHTML = ''
      updateStats()
    }

    async function send() {
      const text = inputEl.value.trim()
      if (!text) return
      inputEl.value = ''

      await mem.user(text)
      const reply = `I received your message about "${text.slice(0, 40)}". That's an interesting topic! Here's a detailed response with enough tokens to test trimming behavior and context management.`
      await mem.assistant(reply)

      renderChat()
      updateStats()
    }

    async function fillUp() {
      const topics = ['quantum computing', 'neural networks', 'climate change', 'space exploration',
        'gene editing', 'fusion energy', 'dark matter', 'consciousness', 'evolution', 'cryptography',
        'black holes', 'nanotechnology', 'string theory', 'photosynthesis', 'plate tectonics',
        'machine learning', 'superconductors', 'CRISPR', 'gravitational waves', 'microbiome']
      for (const topic of topics) {
        await mem.user(`Tell me about ${topic}`)
        await mem.assistant(`${topic.charAt(0).toUpperCase() + topic.slice(1)} is a fascinating field. Recent breakthroughs include significant advances in methodology and understanding. Researchers have made progress on multiple fronts, leading to new applications and deeper theoretical insights.`)
      }
      renderChat()
      updateStats()
      log(`Added 20 conversations. Watch trimming in action!`)
    }

    function renderChat() {
      chatEl.innerHTML = ''
      for (const msg of mem.messages()) {
        const div = document.createElement('div')
        div.className = `msg ${msg.role}`
        div.innerHTML = `<div class="role">${msg.role}</div><div class="text">${esc(msg.content)}</div>`
        chatEl.appendChild(div)
      }
      chatEl.scrollTop = chatEl.scrollHeight
    }

    function updateStats() {
      const info = mem.info()
      document.getElementById('sTokens').textContent = info.tokens
      document.getElementById('sMsgs').textContent = info.messageCount
      document.getElementById('sTurns').textContent = info.turns
      document.getElementById('sSum').textContent = info.hasSummary ? 'Yes' : '—'
    }

    function setMax(n) {
      maxTokens = n
      rebuild()
      log(`Max tokens set to ${n}`)
    }

    function toggleStrategy() {
      strategy = strategy === 'sliding' ? 'summarize' : 'sliding'
      document.getElementById('strat').textContent = strategy
      rebuild()
      log(`Strategy: ${strategy}`)
    }

    function clearAll() { rebuild(); log('Cleared') }

    function exportState() {
      const data = mem.export()
      log('Exported: ' + JSON.stringify(data).slice(0, 200) + '...')
    }

    function log(text) {
      document.getElementById('log').textContent = text
    }

    function esc(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    }

    updateStats()
  </script>
</body>
</html>
